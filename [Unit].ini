[Unit]
Description=Visual Recognition Service
After=network.target

[Service]
User=ubuntu
WorkingDirectory=/home/ubuntu/Intelligent-mosquito-catching-device
ExecStart=/home/ubuntu/Intelligent-mosquito-catching-device/venv/bin/python3 src/services/visual_service.py
Restart=always
RestartSec=5
StandardOutput=syslog
StandardError=syslog
SyslogIdentifier=visual-service

[Install]
WantedBy=multi-user.target